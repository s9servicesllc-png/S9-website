<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S9 Services LLC</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <img src="images/logo.png" alt="S9 Services LLC Logo - Superior by Design">
        <nav>
            <ul>
                <li><a href="#services">Services</a></li>
                <li><a href="#about">About Us</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="services">
            <h2>Our Services</h2>
            <p>Details about the services we offer.</p>
        </section>
        <section id="about">
            <h2>About Us</h2>
            <p>Information about the company.</p>
        </section>
        <section id="contact">
            <h2>Contact Us</h2>
            <button id="quoteButton">Request a Quote</button>
            <div id="quoteModal" style="display:none;">
                <h3>Request a Quote</h3>
                <form id="quoteForm">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email">
                    <input type="submit" value="Submit">
                </form>
                <button id="closeModal">Close</button>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 S9 Services LLC. All rights reserved.</p>
    </footer>
    <script>
        document.getElementById('quoteButton').onclick = function() {
            document.getElementById('quoteModal').style.display = 'block';
        };
        document.getElementById('closeModal').onclick = function() {
            document.getElementById('quoteModal').style.display = 'none';
        };
    </script>
</body>
</html>
